name: Build and deploy to raiz-usar

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-raiz-usar-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar raiz-front
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Buildar projeto
        run: npm run build

      - name: Clonar raiz-usar
        uses: actions/checkout@v4
        with:
          repository: raiz-usar/raiz-usar
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: raiz-usar
          persist-credentials: false

      - name: Limpar arquivos antigos
        run: |
          find raiz-usar -mindepth 1 ! -name ".git" -exec rm -rf {} +

      - name: Copiar build para raiz-usar
        run: |
          cp -r dist/. raiz-usar/

      - name: Commit e push no raiz-usar
        run: |
          cd raiz-usar

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/raiz-usar/raiz-usar.git

          git checkout --orphan deploy-temp
          git add -A

          if git diff --cached --quiet; then
            echo "Nada para publicar"
            exit 0
          fi

          git commit -m "Deploy automatico do raiz-front"
          git push --force origin HEAD:main
